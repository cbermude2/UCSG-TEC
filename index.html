<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCSG TEC - Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #8B2252 0%, #003D7A 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            text-align: center;
            background: white;
            padding: 3rem;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            max-width: 500px;
        }
        h1 {
            color: #8B2252;
            margin-bottom: 1rem;
        }
        p {
            color: #666;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        .buttons {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        a {
            padding: 1rem;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
            display: inline-block;
        }
        .btn-docentes {
            background: #8B2252;
            color: white;
        }
        .btn-docentes:hover {
            background: #6d1a41;
            transform: translateY(-2px);
        }
        .btn-estudiantes {
            background: #003D7A;
            color: white;
        }
        .btn-estudiantes:hover {
            background: #002d5d;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎓 UCSG TEC</h1>
        <p>Centro Universitario de Ciencias Sociales y Humanidades</p>
        <p>Selecciona tu acceso:</p>
        <div class="buttons">
            <a href="https://cbermude2.github.io/UCSG-TEC/docentes/" class="btn-docentes">👨‍🏫 Portal de Docentes</a>
            <a href="https://cbermude2.github.io/UCSG-TEC/estudiantes/" class="btn-estudiantes">👨‍🎓 Portal de Estudiantes</a>
        </div>
    </div>
</body>
</html>
